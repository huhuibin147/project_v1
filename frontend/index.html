<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青石村 - LLM NPC 冒险</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- 开始界面（独立画面） -->
  <div id="start-screen">
    <!-- 主菜单 -->
    <div class="start-content" id="start-menu">
      <div class="start-title">
        <div class="title-main">青石村</div>
        <div class="title-sub">LLM NPC 冒险</div>
      </div>
      <div class="start-menu">
        <button class="start-btn" onclick="showNewGamePanel()">新的冒险</button>
        <button class="start-btn" id="btn-continue" style="display:none">继续冒险</button>
        <button class="start-btn" onclick="showLoadPanel()">读取存档</button>
      </div>
    </div>

    <!-- 新建游戏面板 -->
    <div id="new-game-panel" class="save-panel">
      <div class="panel-header">
        <span class="panel-title">新的冒险</span>
        <button class="panel-close" onclick="closeSavePanel()">×</button>
      </div>
      <div class="save-panel-body">
        <div class="form-group">
          <label class="form-label">冒险者名称</label>
          <input type="text" id="new-name" class="form-input" placeholder="输入你的名字..." maxlength="10" value="冒险者">
        </div>
        <div class="form-group">
          <label class="form-label">选择职业</label>
          <div class="class-cards" id="class-cards"></div>
        </div>
        <div class="form-group">
          <label class="form-label">存档位置</label>
          <div class="slot-select" id="new-slot-select"></div>
        </div>
        <div class="form-actions">
          <button class="start-btn" onclick="confirmNewGame()">开始冒险</button>
          <button class="start-btn secondary" onclick="closeSavePanel()">返回</button>
        </div>
      </div>
    </div>

    <!-- 读取存档面板 -->
    <div id="load-panel" class="save-panel">
      <div class="panel-header">
        <span class="panel-title">读取存档</span>
        <button class="panel-close" onclick="closeSavePanel()">×</button>
      </div>
      <div class="save-panel-body">
        <div class="save-slots" id="load-slots"></div>
        <div class="form-actions">
          <button class="start-btn secondary" onclick="closeSavePanel()">返回</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 游戏容器（初始隐藏） -->
  <div id="game-container" style="display:none">
    <canvas id="game-canvas"></canvas>

    <!-- HUD 玩家状态条 -->
    <div id="hud-bar">
      <div id="hud-player">
        <span id="hud-level">Lv.1</span>
        <span id="hud-hp">120/120</span>
      </div>
      <div id="hud-right">
        <div id="hud-gold-bar">
          <span class="gold-icon">金</span>
          <span id="hud-gold">0</span>
        </div>
        <button id="hud-menu-btn" onclick="toggleGameMenu()">菜单</button>
      </div>
    </div>

    <!-- 游戏菜单面板 -->
    <div id="game-menu-panel">
      <div class="panel-header">
        <span class="panel-title">菜单</span>
        <button class="panel-close" onclick="closeGameMenu()">×</button>
      </div>
      <div class="game-menu-actions">
        <button class="btn-interact" onclick="closeGameMenu(); openInventory()">背包 (I)</button>
        <button class="btn-interact" onclick="closeGameMenu(); openPlayerInfo()">角色信息 (P)</button>
        <button class="btn-interact" onclick="saveGame()">保存游戏</button>
        <button class="btn-interact btn-danger" onclick="returnToMainMenu()">返回主菜单</button>
      </div>
    </div>

    <!-- 对话面板 -->
    <div id="dialogue-panel">
      <div id="dialogue-header">
        <span id="dialogue-title">NPC</span>
        <span id="npc-status">
          情绪: <span id="npc-mood">平静</span> |
          好感度: <span id="npc-affinity">50</span>/100
        </span>
        <span id="intent-badge"></span>
        <button id="dialogue-shop-btn" onclick="openShopFromDialogue()">商店</button>
        <button id="dialogue-close" onclick="closeDialogue()">×</button>
      </div>
      <div id="dialogue-messages"></div>
      <div id="dialogue-loading">正在思考...</div>
      <div id="dialogue-input-area">
        <input type="text" id="dialogue-input" placeholder="输入你想说的话..." autocomplete="off">
        <button id="dialogue-send">发送</button>
      </div>
    </div>

    <!-- 背包面板 -->
    <div id="inventory-panel">
      <div class="panel-header">
        <span class="panel-title">背包</span>
        <span class="panel-gold">金币: <span id="inventory-gold">0</span></span>
        <button class="panel-close" onclick="closeInventory()">×</button>
      </div>
      <div id="inventory-items" class="items-grid"></div>
    </div>

    <!-- NPC 交互选项面板 -->
    <div id="npc-interact-panel">
      <div class="panel-header">
        <span class="panel-title" id="npc-interact-title">NPC</span>
        <button class="panel-close" onclick="closeNpcInteract()">×</button>
      </div>
      <div class="npc-interact-actions">
        <button class="btn-interact" onclick="interactTalk()">对话</button>
        <button class="btn-interact" onclick="interactShop()">商店</button>
      </div>
    </div>

    <!-- 商店面板 -->
    <div id="shop-panel">
      <div class="panel-header">
        <span id="shop-title" class="panel-title">商店</span>
        <span class="panel-info">
          商店金币: <span id="shop-gold">0</span> |
          你的金币: <span id="player-gold-shop">0</span>
        </span>
        <button class="panel-close" onclick="closeShop()">×</button>
      </div>
      <div id="trade-message" class="trade-message" style="display:none"></div>
      <div id="shop-items" class="items-grid"></div>
    </div>

    <!-- 玩家信息面板 -->
    <div id="player-info-panel">
      <div class="panel-header">
        <span class="panel-title">角色信息</span>
        <button class="panel-close" onclick="closePlayerInfo()">×</button>
      </div>
      <div class="pi-body">
        <div class="pi-basic">
          <div class="pi-avatar" id="pi-avatar-icon">剑</div>
          <div class="pi-name-area">
            <div class="pi-name" id="pi-name">冒险者</div>
            <div class="pi-class" id="pi-class">战士</div>
          </div>
          <div class="pi-level-badge">Lv.<span id="pi-level">1</span></div>
        </div>

        <div class="pi-section">
          <div class="pi-bar-row">
            <span class="pi-bar-label">HP</span>
            <div class="pi-bar">
              <div class="pi-bar-fill hp" id="pi-hp-bar" style="width:100%"></div>
            </div>
            <span class="pi-bar-text" id="pi-hp-text">120 / 120</span>
          </div>
          <div class="pi-bar-row">
            <span class="pi-bar-label">EXP</span>
            <div class="pi-bar">
              <div class="pi-bar-fill exp" id="pi-exp-bar" style="width:0%"></div>
            </div>
            <span class="pi-bar-text" id="pi-exp-text">0 / 100</span>
          </div>
        </div>

        <div class="pi-section">
          <div class="pi-stats">
            <div class="pi-stat">
              <span class="pi-stat-label">攻击</span>
              <span class="pi-stat-value" id="pi-attack">15</span>
            </div>
            <div class="pi-stat">
              <span class="pi-stat-label">防御</span>
              <span class="pi-stat-value" id="pi-defense">12</span>
            </div>
            <div class="pi-stat">
              <span class="pi-stat-label">速度</span>
              <span class="pi-stat-value" id="pi-speed">8</span>
            </div>
          </div>
        </div>

        <div class="pi-section">
          <div class="pi-section-title">状态效果</div>
          <div id="pi-effects"><span class="no-effects">无</span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/map.js"></script>
  <script src="/static/js/player.js"></script>
  <script src="/static/js/npc.js"></script>
  <script src="/static/js/dialogue.js"></script>
  <script src="/static/js/inventory.js"></script>
  <script src="/static/js/player_info.js"></script>
  <script src="/static/js/start_screen.js"></script>
  <script src="/static/js/game.js"></script>
</body>
</html>
